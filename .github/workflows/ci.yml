# Name shown in the GitHub Actions tab
name: CI Build

# When to run this workflow
on:
  push:
    branches: [ main ]      # run on every push to main
  pull_request:
    branches: [ main ]      # also run on pull requests targeting main

jobs:
  build:
    # The virtual machine GitHub spins up for us
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven           # cache dependencies so future runs are faster

      # 3. Build and run tests with Maven
      - name: Build with Maven
        run: mvn -B clean verify